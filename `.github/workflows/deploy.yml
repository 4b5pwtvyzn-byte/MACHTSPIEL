name: Deploy MACHTSPIEL

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .   # dein Repo-Root, weil index.html dort liegt
      - uses: actions/deploy-pages@v4
