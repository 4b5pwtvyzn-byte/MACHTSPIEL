<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>MACHTSPIEL</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Helvetica','Arial',sans-serif;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:16px;
      color:#111827;
    }
    #game-container {
      background:white;
      border-radius:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      max-width:960px;
      width:100%;
      max-height:95vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    #game-content { padding:16px; }
    .btn {
      padding:10px 16px;
      border:none;
      border-radius:8px;
      font-size:.95rem;
      font-weight:600;
      cursor:pointer;
      background:#667eea;
      color:white;
      margin-top:12px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <main id="game-content">
      <h1>MACHTSPIEL</h1>
      <p>Einfacher Test‑Startscreen.</p>
      <button id="start-btn" class="btn">Neues Spiel starten</button>
      <div id="log" style="margin-top:12px;font-size:.8rem;color:#555;"></div>
    </main>
  </div>

  <script>
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('log').textContent = 'Start klick funktioniert – JavaScript läuft.';
    });
  </script>
</body>
</html>
